version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: machine-config-validator-db
    environment:
      - POSTGRES_USER=validator
      - POSTGRES_PASSWORD=validator
      - POSTGRES_DB=validator
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  validator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: machine-config-validator
    depends_on:
      - db
    volumes:
      - ./configs:/app/configs:ro
      - ./reports:/app/reports
      - /proc:/host/proc:ro  # Access to host proc for system info
      - /sys:/host/sys:ro    # Access to host sys for system info
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://validator:validator@db:5432/validator
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: machine-config-validator-frontend
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro
      - ./app/static:/app/app/static:ro
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://validator:validator@db:5432/validator
      - TORTOISE_GENERATE_SCHEMAS=true
    command: ["uvicorn", "app.web_app:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

volumes:
  db_data:
