version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: machine-config-validator-db
    environment:
      - POSTGRES_USER=validator
      - POSTGRES_PASSWORD=validator
      - POSTGRES_DB=validator
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U validator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: machine-config-validator-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  validator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: machine-config-validator
    depends_on:
      - db
      - mosquitto
    volumes:
      - ./configs:/app/configs:ro
      - ./reports:/app/reports
      - /proc:/host/proc:ro  # Access to host proc for system info
      - /sys:/host/sys:ro    # Access to host sys for system info
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://validator:validator@db:5432/validator
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=machine
    healthcheck:
      test: ["CMD", "python", "app/validator_healthcheck.py"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: machine-config-validator-simulator
    depends_on:
      - db
      - mosquitto
    volumes:
      - ./configs:/app/configs:ro
      - ./reports:/app/reports
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://validator:validator@db:5432/validator
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=machine
    command: ["python", "run_motor_simulator.py"]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: machine-config-validator-frontend
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro
      - ./app/static:/app/app/static:ro
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://validator:validator@db:5432/validator
      - TORTOISE_GENERATE_SCHEMAS=true
    command: ["uvicorn", "app.web_app:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data:
  mosquitto_data:
